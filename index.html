<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Omkar Dusane | Developer</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700,400italic">
    <link rel="stylesheet" href="/assets/style.css">
    <link rel='stylesheet prefetch' href='https://cdn.gitcdn.link/cdn/angular/bower-material/v1.1.0/angular-material.css'>
    <!-- <link rel='stylesheet prefetch' href='https://material.angularjs.org/1.1.0/docs.css'> -->
    <meta name="viewport" content="width=device-width, initial-scale=1">


    <style>
        @font-face {
            font-family: 'Gotham-Book';
            src: url('fonts/gotham_r_book.ttf');
            /* IE9 Compat Modes */
        }

        @font-face {
            font-family: 'Gotham-Medium';
            src: url('fonts/gotham_r_medium.ttf');
            /* IE9 Compat Modes */
        }

        @font-face {
            font-family: 'Gotham-Bold';
            src: url('fonts/gotham_r_bold.ttf');
            /* IE9 Compat Modes */
        }

        #fontBook {
            font-family: 'Gotham-Book';
        }

        #fontBookMedium {
            font-family: 'Gotham-Medium';
        }

        #fontBold {
            font-family: 'Gotham-Bold';
        }

        /* @media screen and (max-width: 3000px) and (min-width: 960px) {
        } */

        .marginer {
            margin-left: 30%;
            margin-right: 30%;
        }

        @media screen and (max-width: 960px) {
            .marginer {
                margin-left: 5%;
                margin-right: 5%;
            }
            .imagec {
                align-self: center;
            }
        }

        .imagec {
            align-self: left;
        }
    </style>

</head>

<body id="fontBook">
    <div ng-controller="AppCtrl" ng-cloak="" class="carddemoCardActionButtons" ng-app="MyApp">
        <div md-align="center" layout="column" class="marginer">
            <!-- SECOND DEVISION IMAGE AND PERSONAL DETAILS -->
            <md-card layout-gt-sm="row" layout-sm="column">
                <img style="width:160px;height:200px;" ng-src="https://raw.githubusercontent.com/omkardusane/omkardusane.github.io/master/assets/omkar_dusane.jpg"
                    class="md-card-image imagec" alt="-">
                <div layout="column" style="margin:7%;">
                    <div class="md-headline" id="fontBold">Omkar Dusane</div>
                    <div class="md-subhead" id="fontBold">Software Engineer, Technical Advisor & Author </div>
                </div>
            </md-card>
            <div flex="30" layout="column">
                <md-card>
                    <md-card-content>
                        <p id="fontBookMedium" style="word-wrap: break-word;">
                            omkardusane@gmail.com
                            <br /> +91 9821850314 </p>
                        <md-divider></md-divider>
                        <md-card-actions layout="column" layout-align="start">
                            <md-button ng-click="git()">GitHub</md-button>
                            <md-button ng-click="linkedin()">LinkedIn</md-button>
                            <md-button ng-click="facebook()">Facebook</md-button>
                            <md-button ng-click="resume()">Resume</md-button>
                            <md-button ng-click="books()">Published Books</md-button>
                            <md-button ng-show="showbooks" ng-click="book1()">Introductory Serverless Computing</md-button>
                            <md-button ng-show="showbooks" ng-click="book2()">Advanced Serverless Computing</md-button>

                        </md-card-actions>
                    </md-card-content>
                </md-card>
            </div>

            <script src='https://ajax.googleapis.com/ajax/libs/angularjs/1.5.5/angular.js'></script>
            <script src='https://ajax.googleapis.com/ajax/libs/angularjs/1.5.5/angular-animate.min.js'></script>
            <script src='https://ajax.googleapis.com/ajax/libs/angularjs/1.5.5/angular-route.min.js'></script>
            <script src='https://ajax.googleapis.com/ajax/libs/angularjs/1.5.5/angular-aria.min.js'></script>
            <script src='https://ajax.googleapis.com/ajax/libs/angularjs/1.5.5/angular-messages.min.js'></script>
            <script src='https://s3-us-west-2.amazonaws.com/s.cdpn.io/t-114/svg-assets-cache.js'></script>
            <script src='https://cdn.gitcdn.link/cdn/angular/bower-material/v1.1.0/angular-material.js'></script>
            <script>
                angular.module('MyApp', ['ngMaterial', 'ngMessages', 'material.svgAssetsCache'])
                    .controller('AppCtrl', function ($scope, $interval) {
                        $scope.showbooks = false;
                        $scope.imagePath = 'https://s4.postimg.org/yvip15065/omkar_dusane.jpg';
                        $scope.linkedin = function () {
                            window.open('https://www.linkedin.com/in/omkardusane');
                        };

                        $scope.facebook = function () {
                            window.open('https://www.facebook.com/dusaneomkar2');
                        };

                        $scope.git = function () {
                            window.open('https://www.github.com/omkardusane');
                        };

                        $scope.resume = function () {
                            window.open('Resume_Omkar_Dusane.pdf');
                        };

                        $scope.books = function () {
                            $scope.showbooks = !$scope.showbooks;
                        };
                        $scope.book1 = function () {
                            window.open('https://www.packtpub.com/virtualization-and-cloud/getting-started-azure-serverless-computing-nodejs-video');
                        };
                        $scope.book2 = function () {
                            window.open('https://www.packtpub.com/virtualization-and-cloud/serverless-azure-functions-debugging-deployment-and-chatbots-video');
                        };
                    });
            </script>
</body>

</html>
